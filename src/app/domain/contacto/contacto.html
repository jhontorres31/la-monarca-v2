<!-- Botón flotante -->
<button
  (click)="toggleChat()"
  class="fixed bottom-7 right-7 z-50 w-14 h-14 rounded-full
         bg-gradient-to-br from-orange-400 to-orange-600
         shadow-lg shadow-orange-500/40
         flex items-center justify-center
         transition-transform duration-200 hover:scale-110 active:scale-95
         border-0 cursor-pointer"
  aria-label="Abrir chat">

  @if (!isOpen()) {
    <span class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white
                 text-[10px] font-bold rounded-full flex items-center
                 justify-center border-2 border-white">1</span>
  }

  <span class="text-2xl text-white">{{ isOpen() ? '✕' : '💬' }}</span>
</button>

<!-- Ventana del chat -->
<div
  class="fixed bottom-28 right-7 z-40 w-[360px] max-h-[540px]
         bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden
         transition-all duration-300 origin-bottom-right
         max-sm:w-[calc(100vw-24px)] max-sm:right-3"
  [class.scale-100]="isOpen()"
  [class.opacity-100]="isOpen()"
  [class.pointer-events-auto]="isOpen()"
  [class.scale-90]="!isOpen()"
  [class.opacity-0]="!isOpen()"
  [class.pointer-events-none]="!isOpen()">

  <!-- Header -->
  <div class="bg-gradient-to-r from-orange-400 to-orange-600 px-5 py-4
              flex items-center gap-3 text-white">
    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center
                justify-center text-xl shrink-0">
      🦋
    </div>
    <div class="flex-1 min-w-0">
      <p class="font-bold text-sm leading-tight">La Monarca</p>
      <p class="text-xs text-green-200 opacity-90">● En línea</p>
    </div>
    <button
      (click)="toggleChat()"
      class="text-white/80 hover:text-white text-lg leading-none
             bg-transparent border-0 cursor-pointer px-1">
      ✕
    </button>
  </div>

  <!-- Mensajes -->
  <div
    #messagesContainer
    class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-3 bg-orange-50/40">

    @for (msg of messages(); track $index) {
      <div
        class="flex flex-col max-w-[80%]"
        [class.self-end]="msg.sender === 'user'"
        [class.items-end]="msg.sender === 'user'"
        [class.self-start]="msg.sender === 'bot'"
        [class.items-start]="msg.sender === 'bot'">

        <div
          class="px-4 py-2.5 rounded-2xl text-sm leading-snug break-words"
          [class.bg-gradient-to-br]="msg.sender === 'user'"
          [class.from-orange-400]="msg.sender === 'user'"
          [class.to-orange-600]="msg.sender === 'user'"
          [class.text-white]="msg.sender === 'user'"
          [class.rounded-br-sm]="msg.sender === 'user'"
          [class.bg-white]="msg.sender === 'bot'"
          [class.text-gray-700]="msg.sender === 'bot'"
          [class.shadow-sm]="msg.sender === 'bot'"
          [class.rounded-bl-sm]="msg.sender === 'bot'">
          {{ msg.text }}
        </div>

        <span class="text-[11px] text-gray-400 mt-1 px-1">
          {{ msg.time | date:'HH:mm' }}
        </span>
      </div>
    }

    <!-- Typing indicator -->
    @if (isTyping()) {
      <div class="self-start">
        <div class="bg-white shadow-sm px-4 py-3 rounded-2xl rounded-bl-sm
                    flex gap-1.5 items-center">
          <span class="w-2 h-2 rounded-full bg-gray-300 animate-bounce [animation-delay:0ms]"></span>
          <span class="w-2 h-2 rounded-full bg-gray-300 animate-bounce [animation-delay:200ms]"></span>
          <span class="w-2 h-2 rounded-full bg-gray-300 animate-bounce [animation-delay:400ms]"></span>
        </div>
      </div>
    }
  </div>

  <!-- Sugerencias -->
  @if (suggestions().length && !isTyping()) {
    <div class="px-3 py-2 flex flex-wrap gap-1.5 bg-orange-50/40 border-t border-orange-100">
      @for (s of suggestions(); track s) {
        <button
          (click)="sendMessage(s)"
          class="text-xs px-3 py-1.5 rounded-full border border-orange-400
                 text-orange-600 bg-white hover:bg-orange-500 hover:text-white
                 transition-colors duration-150 cursor-pointer font-medium">
          {{ s }}
        </button>
      }
    </div>
  }

  <!-- Input -->
  <div class="flex gap-2 px-4 py-3 bg-white border-t border-gray-100">
    <input
      type="text"
      placeholder="Escribe tu pregunta..."
      [value]="userInput()"
      (input)="userInput.set($any($event.target).value)"
      (keydown)="onKeyDown($event)"
      maxlength="200"
      class="flex-1 border border-gray-200 rounded-full px-4 py-2.5 text-sm
             outline-none focus:border-orange-400 transition-colors duration-150" />

    <button
      (click)="sendMessage()"
      [disabled]="!canSend()"
      class="w-10 h-10 rounded-full bg-gradient-to-br from-orange-400 to-orange-600
             text-white flex items-center justify-center shrink-0
             transition-all duration-150 border-0 cursor-pointer
             hover:scale-110 disabled:opacity-40 disabled:cursor-not-allowed
             disabled:hover:scale-100">
      ➤
    </button>
  </div>

</div>
