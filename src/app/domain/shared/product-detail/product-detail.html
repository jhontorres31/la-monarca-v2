@if (product(); as item) {
  <div class="max-w-5xl mx-auto mt-12 p-6">
    <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row border border-gray-100">
      
      <!-- Contenedor Imagen -->
      <div class="md:w-1/2 bg-slate-50 p-12 flex items-center justify-center">
        <img [src]="item.imagen_producto" 
             [alt]="item.nombre_producto"
             class="w-full max-h-[400px] object-contain hover:scale-105 transition-transform duration-500">
      </div>

      <!-- Contenedor Info -->
      <div class="md:w-1/2 p-12 flex flex-col justify-center">
        <span class="text-amber-500 font-black uppercase tracking-[0.2em] text-xs mb-4">
          {{ item.tipo_producto }}
        </span>
        
        <h1 class="text-5xl font-headings font-black text-slate-900 italic mb-6 leading-tight">
          {{ item.nombre_producto }}
        </h1>

        <div class="flex items-baseline gap-2 mb-10">
          <span class="text-4xl font-bold text-orange-600">
            {{ item.valor_producto | currency:'COP':'symbol':'1.0-0' }}
          </span>
          <span class="text-slate-400 text-sm font-medium uppercase">IVA Incluido</span>
        </div>

        <button (click)="addToCart(item)" class="flex justify-center gap-3 w-full bg-red-600 hover:bg-red-700 text-white font-black py-5 rounded-2xl 
                       shadow-[0_10px_20px_-5px_rgba(220,38,38,0.4)] 
                       active:scale-95 transition-all uppercase tracking-widest text-lg">
                       <svg  xmlns="http://www.w3.org/2000/svg" 
                        fill="none" 
                         viewBox="0 0 24 24" 
                        stroke-width="1.5" 
                        stroke="currentColor" 
                        class="w-6 h-6 text-white"
                        >
                <path 
                       stroke-linecap="round" 
                       stroke-linejoin="round" 
                       d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" 
                      />
                    </svg>
          Añadir al Carrito
        </button>

        <a routerLink="/list-product" class="mt-8 text-center text-slate-400 hover:text-orange-500 transition-colors font-medium">
          ← Volver al catálogo
        </a>
      </div>
    </div>
  </div>
} @else {
  <!-- Skeleton loader sutil -->
  <div class="flex flex-col items-center justify-center h-96">
    <div class="w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 text-slate-500 font-bold animate-pulse uppercase tracking-widest text-xs">
      Buscando en La Monarca...
    </p>
  </div>
}
