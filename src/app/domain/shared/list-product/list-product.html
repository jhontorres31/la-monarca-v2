<div class="container mx-auto mt-10 px-4 ">

    <div class="flex flex-wrap gap-2 mb-10 justify-center">
        @for (cat of categories(); track cat) {
            <button 
                (click)="changeFilter(cat)"
                [class.bg-red-600]="selectedType() === cat"
                [class.text-white]="selectedType() === cat"
                [class.bg-gray-100]="selectedType() !== cat"
                [class.text-gray-700]="selectedType() !== cat"
                class="px-6 py-2 rounded-full font-medium transition-all hover:shadow-md border border-transparent active:scale-95">
                {{ cat }}
            </button>
        }
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        @for (product of finalFilterProducts(); track product.id_producto) {
            <div [routerLink]="['/producto', product.id_producto]" class="rounded-lg p-4 shadow-sm h-120">
                <img [src]="product.imagen_producto + '?width=300&height=300'" [alt]="product.nombre_producto" class="min-w min-h object-cover mb-2">
                <h3 class="font-bold text-lg">{{ product.nombre_producto }}</h3>
                <p class="text-gray-600">{{ product.valor_producto | currency: 'COP ': 'symbol':'1.0' }}</p>
                <button
                (click)="$event.stopPropagation(); addToCart(product)" 
                class=" flex justify-center gap-3 bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg transition-all mt-2 text-white w-full cursor-pointer">
                <svg  xmlns="http://www.w3.org/2000/svg" 
                        fill="none" 
                         viewBox="0 0 24 24" 
                        stroke-width="1.5" 
                        stroke="currentColor" 
                        class="w-6 h-6 text-white"
                        >
                <path 
                       stroke-linecap="round" 
                       stroke-linejoin="round" 
                       d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" 
                      />
                    </svg>
                Agregar al Carrito
            </button>
            </div>
        }
    </div>
</div>
