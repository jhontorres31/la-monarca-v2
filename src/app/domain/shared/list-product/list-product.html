<div class="container mx-auto mt-10 px-4 ">

    <div class="flex flex-wrap gap-2 mb-8 justify-center">
        @for (cat of categories(); track cat) {
            <button 
                (click)="changeFilter(cat)"
                [class.bg-blue-600]="selectedType() === cat"
                [class.text-white]="selectedType() === cat"
                [class.bg-gray-100]="selectedType() !== cat"
                [class.text-gray-700]="selectedType() !== cat"
                class="px-6 py-2 rounded-full font-medium transition-all hover:shadow-md border border-transparent active:scale-95">
                {{ cat }}
            </button>
        }
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        @for (product of filteredProducts(); track product.id_producto) {
            <div class=" border rounded-lg p-4 shadow-sm h-120">
                <img [src]="product.imagen_producto" [alt]="product.nombre_producto" class="min-w min-h object-cover mb-2">
                <h3 class="font-bold text-lg">{{ product.nombre_producto }}</h3>
                <p class="text-gray-600">{{ product.valor_producto | currency: 'COP ': 'symbol':'1.0' }}</p>
                <button class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition-all mt-2 text-white">Add to Cart</button>
            </div>
        }
    </div>
</div>
