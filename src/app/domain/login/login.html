<div class="fixed inset-0 z-50 flex items-center justify-center">
  
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" (click)="cerrar()"></div>

  <form 
    (submit)="$event.preventDefault();"
    class="relative bg-white p-10 rounded-xl shadow-2xl flex flex-col items-center w-full max-w-md gap-4">
    
    <h1 class="text-2xl font-bold text-gray-800">Login</h1>
    
    <input 
      type="text" 
      [value]="email()"
      (input)="email.set($any($event.target).value)"
      placeholder="Correo" 
      class="w-full text-black border border-gray-300 p-2 rounded focus:ring-2 focus:ring-amber-600 outline-none" 
    />
    
    <input 
      type="password" 
      [value]="password()"
      (input)="password.set($any($event.target).value)"
      placeholder="Contraseña" 
      class="w-full  text-black border border-gray-300 p-2 rounded focus:ring-2 focus:ring-amber-600 outline-none" 
    />
    
    <button 
      (click)="iniciarSesion()"
      type="button" 
      class="w-full bg-amber-600 text-white py-2 rounded font-bold hover:bg-amber-700 transition-colors">
      Entrar
    </button>

    <button 
    type="button"
    (click)="toggleRegister()"
    class="w-full border border-amber-600 rounded bg-white text-amber-600 font-bold hover:bg-gray-200 transition-colors">
      Registrarme
    </button>
    
    <button 
    type="button" 
    (click)="cerrar()" class="text-gray-400 text-sm underline hover:text-gray-600">
      Cancelar
    </button>
  </form>
  @if(hideRegister()) {
    <app-registro (onClose)="cerrarRegister()"></app-registro>
  }
</div>
