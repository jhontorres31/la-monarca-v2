<div class="fixed inset-0 z-50 flex items-center justify-center">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" (click)="cerrar()"></div>

  <form
    (submit)="$event.preventDefault();"
    class="relative bg-white rounded-[18px] shadow-2xl w-full max-w-sm overflow-hidden">

    <!-- Header naranja con ola -->
    <div class="relative px-8 pt-8 pb-10"
         style="background: linear-gradient(135deg, #F97316 0%, #EA580C 50%, #C2410C 100%)">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl"
             style="background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4)">
          🦋
        </div>
        <div>
          <p class="text-white font-black tracking-widest text-2xl leading-none"
             style="font-family: 'Bebas Neue', 'Impact', sans-serif">LA MONARCA</p>
          <p class="text-white/75 text-xs tracking-wide">Expres · Licores & Bebidas</p>
        </div>
      </div>
      <!-- Ola decorativa -->
      <svg class="absolute bottom-[-1px] left-0 w-full h-8" viewBox="0 0 400 30"
           preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,15 C100,28 300,2 400,15 L400,30 L0,30 Z" fill="white"/>
      </svg>
    </div>

    <!-- Cuerpo del formulario -->
    <div class="px-8 pt-6 pb-6 flex flex-col gap-4">

      <div class="flex flex-col gap-1">
        <label class="text-[11px] font-semibold text-gray-500 tracking-widest uppercase">
          Correo electrónico
        </label>
        <input
          type="email"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          placeholder="tu@correo.com"
          class="bg-gray-50 border border-gray-200 rounded-[10px] px-4 py-3 text-sm text-black outline-none transition-all
                 focus:border-orange-500 focus:ring-2 focus:ring-orange-500/15 focus:bg-white"
        />
      </div>

      <div class="flex flex-col gap-1">
        
        <label class="text-[11px] font-semibold text-gray-500 tracking-widest uppercase">
          Contraseña
        </label>
        <div class="relative">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          placeholder="••••••••"
          class="w-full bg-gray-50 border border-gray-200 rounded-[10px] px-4 py-3 pr-11 text-sm text-black outline-none transition-all
             focus:border-orange-500 focus:ring-2 focus:ring-orange-500/15 focus:bg-white"
        />
        <button
    type="button"
    (click)="showPassword.set(!showPassword())"
    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
    [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
  >
    
    @if (!showPassword()) {
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    }
   
    @if (showPassword()) {
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
      </svg>
    }
  </button>
  </div>
      </div>

      <button
        (click)="iniciarSesion()"
        type="button"
        class="w-full text-white font-semibold py-3 rounded-[10px] mt-1 transition-all hover:opacity-90 active:scale-[0.98]"
        style="background: linear-gradient(135deg, #F97316, #EA580C)">
        Entrar
      </button>

      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-xs text-gray-400 whitespace-nowrap">¿No tienes cuenta?</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <button
        type="button"
        (click)="toggleRegister()"
        class="w-full bg-transparent text-orange-600 border border-orange-500 font-semibold py-3 rounded-[10px]
               hover:bg-orange-50 transition-colors">
        Registrarme
      </button>

      <button
        type="button"
        (click)="cerrar()"
        class="text-gray-400 text-sm underline hover:text-gray-600 transition-colors py-1">
        Cancelar
      </button>
    </div>
  </form>

  @if(hideRegister()) {
    <app-registro (onClose)="cerrarRegister()"></app-registro>
  }
</div>
