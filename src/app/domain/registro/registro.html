<div class="fixed inset-0 z-50 flex items-center justify-center">
  
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" (click)="cerrar()"></div>
  
    <form 
      (submit)="$event.preventDefault();"
      class="relative bg-white p-10 rounded-xl shadow-2xl flex flex-col items-center w-full max-w-md gap-4">
      
      <h1 class="text-2xl font-bold text-gray-800">Registrarme</h1>
      
      <input 
        type="text" 
        [value]="nombresyapellidos()"
        (input)="nombresyapellidos.set($any($event.target).value)"
        placeholder="Nombres" 
        class="w-full text-black border border-gray-300 p-2 rounded focus:ring-2 focus:ring-amber-600 outline-none" 
      />
      
      <input 
        type="text" 
        [value]="cedula()"
        (input)="cedula.set($any($event.target).value)"
        placeholder="Cedula" 
        class="w-full  text-black border border-gray-300 p-2 rounded focus:ring-2 focus:ring-amber-600 outline-none" 
      />

      <input 
      type="Email"
      [value]="email()"
      (input)="email.set($any($event.target).value)" 
      placeholder="Email" 
      class="w-full  text-black border border-gray-300 p-2 rounded focus:ring-2 focus:ring-amber-600 outline-none" 
    />

      <input 
    type="text"
    [value]="ciudad()"
    (input)="ciudad.set($any($event.target).value)" 
    placeholder="Ciudad" 
    class="w-full  text-black border border-gray-300 p-2 rounded focus:ring-2 focus:ring-amber-600 outline-none" 
  />

  <input 
    type="text"
    [value]="telefono()"
    (input)="telefono.set($any($event.target).value)" 
    placeholder="Telefono" 
    class="w-full  text-black border border-gray-300 p-2 rounded focus:ring-2 focus:ring-amber-600 outline-none" 
  />

    <input 
    type="text"
    [value]="direccion()"
    (input)="direccion.set($any($event.target).value)" 
    placeholder="Direccion" 
    class="w-full  text-black border border-gray-300 p-2 rounded focus:ring-2 focus:ring-amber-600 outline-none" 
  />

  <input 
  type="password"
  [value]="password()"
  (input)="password.set($any($event.target).value)" 
  placeholder="Contraseña" 
  class="w-full  text-black border border-gray-300 p-2 rounded focus:ring-2 focus:ring-amber-600 outline-none" 
/>
      
      
      <button 
      (click)="registrarUsuario()"
      class="w-full border rounded bg-amber-600 text-white font-bold hover:bg-amber-700 transition-colors">
        Registrarme
      </button>
      <button 
      (click)="cerrar()"
      type="button"  
      class="text-gray-400 text-sm underline hover:text-gray-600">
        Atras
      </button>
      
  
    </form>
  </div>
