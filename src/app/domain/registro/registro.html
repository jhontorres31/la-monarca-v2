<div class="fixed inset-0 z-50 flex items-center justify-center">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" (click)="cerrar()"></div>

  <form
    (submit)="$event.preventDefault();"
    class="relative bg-white rounded-[18px] shadow-2xl w-full max-w-[420px] 
         overflow-y-auto my-auto max-h-[90vh]">

    <!-- Header -->
    <div class="relative px-8 pt-7 pb-10"
         style="background: linear-gradient(135deg, #F97316 0%, #EA580C 50%, #C2410C 100%)">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-full flex items-center justify-center text-xl flex-shrink-0"
             style="background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4)">🦋</div>
        <div>
          <p class="text-white font-black tracking-widest text-2xl leading-none"
             style="font-family: 'Bebas Neue', 'Impact', sans-serif">LA MONARCA</p>
          <p class="text-white/75 text-xs">Crea tu cuenta · Es gratis</p>
        </div>
      </div>
      <svg class="absolute bottom-[-1px] left-0 w-full h-7" viewBox="0 0 400 28"
           preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,14 C100,26 300,2 400,14 L400,28 L0,28 Z" fill="white"/>
      </svg>
    </div>

    <!-- Body -->
    <div class="px-8 pt-5 pb-7 flex flex-col gap-3">

      <!-- Botón Google -->
      <button type="button" (click)="registrarConGoogle()"
              class="flex items-center justify-center gap-3 w-full bg-white border border-gray-200
                     rounded-[10px] py-3 text-sm font-semibold text-gray-700
                     hover:bg-gray-50 hover:border-gray-300 transition-all">
        <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>

      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-[11.5px] text-gray-400">o completa tus datos</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Nombres y Cédula -->
      <div class="grid grid-cols-2 gap-2.5">
        <div class="flex flex-col gap-1">
          <label class="text-[11px] font-semibold text-gray-500 tracking-widest uppercase">Nombres</label>
          <input type="text" [value]="nombresyapellidos()"
                 (input)="nombresyapellidos.set($any($event.target).value)"
                 (keydown)="blockNumbers($event)"
                 placeholder="Juan Pérez"
                 class="bg-gray-50 border border-gray-200 rounded-[10px] px-3 py-2.5 text-[13.5px] text-black outline-none
                        focus:border-orange-500 focus:ring-2 focus:ring-orange-500/15 focus:bg-white transition-all"/>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[11px] font-semibold text-gray-500 tracking-widest uppercase">Cédula</label>
          <input type="text" [value]="cedula()"
                 (input)="cedula.set($any($event.target).value)"
                 (keydown)="onlyNumbers($event)"
                 placeholder="1234567890"
                 class="bg-gray-50 border border-gray-200 rounded-[10px] px-3 py-2.5 text-[13.5px] text-black outline-none
                        focus:border-orange-500 focus:ring-2 focus:ring-orange-500/15 focus:bg-white transition-all"/>
        </div>
      </div>

      <!-- Email -->
      <div class="flex flex-col gap-1">
        <label class="text-[11px] font-semibold text-gray-500 tracking-widest uppercase">Correo electrónico</label>
        <input type="email" [value]="email()"
               (input)="email.set($any($event.target).value)"
               placeholder="tu@correo.com"
               class="bg-gray-50 border border-gray-200 rounded-[10px] px-3 py-2.5 text-[13.5px] text-black outline-none
                      focus:border-orange-500 focus:ring-2 focus:ring-orange-500/15 focus:bg-white transition-all"/>
      </div>

      <!-- Ciudad y Teléfono -->
      <div class="grid grid-cols-2 gap-2.5">
        <div class="flex flex-col gap-1">
          <label class="text-[11px] font-semibold text-gray-500 tracking-widest uppercase">Ciudad</label>
          <input type="text" 
                  [value]="ciudad()"
                 (input)="ciudad.set($any($event.target).value)"
                 (keydown)="blockNumbers($event)"
                 placeholder="IBAGUÉ"
                 class="bg-gray-50 border border-gray-200 rounded-[10px] px-3 py-2.5 text-[13.5px] text-black outline-none
                        focus:border-orange-500 focus:ring-2 focus:ring-orange-500/15 focus:bg-white transition-all"/>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[11px] font-semibold text-gray-500 tracking-widest uppercase">Teléfono</label>
          <input type="text" [value]="telefono()"
                 (input)="telefono.set($any($event.target).value)"
                 (keydown)="onlyNumbers($event)"
                 placeholder="300 000 0000"
                 class="bg-gray-50 border border-gray-200 rounded-[10px] px-3 py-2.5 text-[13.5px] text-black outline-none
                        focus:border-orange-500 focus:ring-2 focus:ring-orange-500/15 focus:bg-white transition-all"/>
        </div>
      </div>

      <!-- Dirección -->
      <div class="flex flex-col gap-1">
        <label class="text-[11px] font-semibold text-gray-500 tracking-widest uppercase">Dirección</label>
        <input type="text" [value]="direccion()"
               (input)="direccion.set($any($event.target).value)"
               placeholder="Calle 123 # 45-67"
               class="bg-gray-50 border border-gray-200 rounded-[10px] px-3 py-2.5 text-[13.5px] text-black outline-none
                      focus:border-orange-500 focus:ring-2 focus:ring-orange-500/15 focus:bg-white transition-all"/>
      </div>

      <!-- Contraseña -->
      <div class="flex flex-col gap-1">
        <label class="text-[11px] font-semibold text-gray-500 tracking-widest uppercase">Contraseña</label>
        <input type="password" [value]="password()"
               (input)="password.set($any($event.target).value)"
               placeholder="••••••••"
               class="bg-gray-50 border border-gray-200 rounded-[10px] px-3 py-2.5 text-[13.5px] text-black outline-none
                      focus:border-orange-500 focus:ring-2 focus:ring-orange-500/15 focus:bg-white transition-all"/>
      </div>

      <!-- Verificación -->
      <div class="rounded-xl border border-orange-200 bg-orange-50 p-3.5 flex flex-col gap-3 mt-1">
        <span class="inline-flex items-center gap-1.5 bg-white border border-orange-200 text-orange-700
                     text-[11px] font-semibold rounded-lg px-2.5 py-1 w-fit">
          ⚠ Verificación requerida
        </span>

        <label class="flex items-start gap-2.5 cursor-pointer">
          <input type="checkbox" [(ngModel)]="aceptaMayorEdad" name="mayorEdad"
                 class="mt-0.5 w-4 h-4 accent-orange-600 cursor-pointer flex-shrink-0"/>
          <span class="text-[12.5px] text-gray-600 leading-relaxed">
            Confirmo que soy <strong>mayor de 18 años</strong>. El expendio de bebidas embriagantes a menores de edad está prohibido por la ley colombiana.
          </span>
        </label>

        <label class="flex items-start gap-2.5 cursor-pointer">
          <input type="checkbox" [(ngModel)]="aceptaTerminos" name="terminos"
                 class="mt-0.5 w-4 h-4 accent-orange-600 cursor-pointer flex-shrink-0"/>
          <span class="text-[12.5px] text-gray-600 leading-relaxed">
            He leído y acepto los
            <a href="/terminos" target="_blank" class="text-orange-600 font-semibold underline">Términos y Condiciones</a>
            y la
            <a href="/privacidad" target="_blank" class="text-orange-600 font-semibold underline">Política de Privacidad</a>.
          </span>
        </label>
      </div>

      <button
        (click)="registrarUsuario()"
        type="button"
        [disabled]="!aceptaMayorEdad || !aceptaTerminos"
        class="w-full text-white font-semibold py-3 rounded-[10px] mt-1 transition-all
               disabled:opacity-50 disabled:cursor-not-allowed
               hover:opacity-90 active:scale-[0.98]"
        style="background: linear-gradient(135deg, #F97316, #EA580C)">
        Crear mi cuenta
      </button>

      <button type="button" (click)="cerrar()"
              class="text-gray-400 text-sm underline hover:text-gray-600 transition-colors py-1 text-center w-full">
        ← Atrás
      </button>
    </div>
  </form>
</div>
